name: Build, Push & Deploy GHCR

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: myapp

    outputs:
      image: ${{ steps.set-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image full name
        id: set-image
        run: |
          echo "IMAGE=ghcr.io/$OWNER/${{ env.IMAGE_NAME }}" >> $GITHUB_ENV
          echo "image=ghcr.io/$OWNER/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t $IMAGE:latest .

      - name: Push image
        run: docker push $IMAGE:latest


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - name: TailScale status 
        run: tailscale status

        
      - name: Deploy on VM
        run: |
          tailscale ssh ${{ secrets.SSH_USER }}@${{ secrets.TAILSCALE_HOST }} << EOF
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/$OWNER/myapp:latest
            
            docker stop myapp || true
            docker rm myapp || true
            
            docker run -d --name myapp -p 80:80 ghcr.io/$OWNER/myapp:latest
          EOF
